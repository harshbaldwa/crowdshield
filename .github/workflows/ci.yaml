name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  source:
    name: Source, static analysis, and licenses
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      GOFLAGS: -mod=readonly
      GOTOOLCHAIN: local
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true

      - name: Verify modules and formatting
        run: |
          mkdir -p .tmp
          go version
          go mod verify
          go_files="$(git ls-files '*.go')"
          unformatted="$(gofmt -l ${go_files})"
          if [[ -n "${unformatted}" ]]; then
            printf 'Go files require gofmt:\n%s\n' "${unformatted}" >&2
            exit 1
          fi
          git diff --exit-code -- go.mod go.sum

      - name: Unit tests
        run: go test -count=1 ./...

      - name: Race tests
        run: go test -race -count=1 ./...

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...

      - name: gosec
        run: >-
          go run github.com/securego/gosec/v2/cmd/gosec@v2.28.0
          -exclude-generated -quiet -fmt=json -out=.tmp/gosec.json
          ./cmd/... ./internal/... ./migrations/...

      - name: Go vulnerability analysis
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 -json ./... > .tmp/govulncheck.json

      - name: Build static binary and reconcile notices
        run: |
          CGO_ENABLED=0 go build -mod=readonly -trimpath -buildvcs=false \
            -ldflags='-s -w -buildid=' -o .tmp/crowdshield ./cmd/crowdshield
          file .tmp/crowdshield | tee .tmp/binary-file.txt
          scripts/verify-notices.py .tmp/crowdshield
          go run github.com/google/go-licenses/v2@v2.0.1 report ./cmd/crowdshield > .tmp/license-report.csv

      - name: Secret scan source
        run: |
          docker run --rm \
            --volume "$PWD:/repo:ro" --workdir /repo \
            docker.io/zricethezav/gitleaks:v8.30.0@sha256:691af3c7c5a48b16f187ce3446d5f194838f91238f27270ed36eef6359a574d9 \
            dir --redact --no-banner --exit-code 1 .

      - name: Lint Dockerfiles
        run: |
          docker run --rm -i \
            docker.io/hadolint/hadolint:v2.14.0-debian@sha256:158cd0184dcaa18bd8ec20b61f4c1cabdf8b32a592d062f57bdcb8e4c1d312e2 \
            hadolint --failure-threshold warning - < Dockerfile
          docker run --rm -i \
            docker.io/hadolint/hadolint:v2.14.0-debian@sha256:158cd0184dcaa18bd8ec20b61f4c1cabdf8b32a592d062f57bdcb8e4c1d312e2 \
            hadolint --failure-threshold warning - < test/container/mock-lapi.Dockerfile

      - name: Lint shell and Compose
        run: |
          docker run --rm --volume "$PWD:/mnt:ro" \
            docker.io/koalaman/shellcheck:v0.11.0@sha256:61862eba1fcf09a484ebcc6feea46f1782532571a34ed51fedf90dd25f925a8d \
            -x /mnt/scripts/container-smoke.sh
          docker compose -f compose.yaml config --quiet

      - name: Confirm module files unchanged
        run: git diff --exit-code -- go.mod go.sum

      - name: Upload source reports
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: source-reports-${{ github.run_id }}
          path: |
            .tmp/binary-file.txt
            .tmp/gosec.json
            .tmp/govulncheck.json
            .tmp/license-report.csv
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 14

  container:
    name: Container, smoke, SBOM, and scans
    needs: source
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Build local image with source metadata
        run: |
          mkdir -p .tmp
          epoch="$(git show -s --format=%ct "${GITHUB_SHA}")"
          build_date="$(date -u -d "@${epoch}" '+%Y-%m-%dT%H:%M:%SZ')"
          docker buildx build --platform linux/amd64 --load --progress=plain \
            --build-arg VERSION=ci \
            --build-arg REVISION="${GITHUB_SHA}" \
            --build-arg BUILD_DATE="${build_date}" \
            --build-arg SOURCE_DATE_EPOCH="${epoch}" \
            --tag crowdshield:ci .

      - name: Validate Compose and image artifact
        run: |
          docker compose -f compose.yaml config --quiet
          scripts/verify-image.py crowdshield:ci

      - name: Run isolated container smoke tests
        run: scripts/container-smoke.sh crowdshield:ci

      - name: Save image metadata and archive
        run: |
          docker image inspect crowdshield:ci > .tmp/image-inspect.json
          docker history --no-trunc crowdshield:ci > .tmp/image-history.txt
          docker save --output .tmp/crowdshield-image.tar crowdshield:ci
          gzip -9 -c .tmp/crowdshield-image.tar > .tmp/crowdshield-image.tar.gz
          python3 - <<'PY'
          import json
          import os
          import subprocess
          inspect = json.loads(subprocess.run(
              ("docker", "image", "inspect", "crowdshield:ci"),
              check=True, text=True, capture_output=True,
          ).stdout)[0]
          evidence = {
              "image_size_bytes": inspect["Size"],
              "docker_archive_bytes": os.path.getsize(".tmp/crowdshield-image.tar"),
              "gzip_archive_bytes": os.path.getsize(".tmp/crowdshield-image.tar.gz"),
          }
          with open(".tmp/image-size.json", "w", encoding="utf-8") as output:
              json.dump(evidence, output, indent=2)
              output.write("\n")
          PY

      - name: Generate CycloneDX and SPDX SBOMs
        run: |
          docker run --rm --network none --env SYFT_CHECK_FOR_APP_UPDATE=false --volume "$PWD/.tmp:/work" \
            docker.io/anchore/syft:v1.42.2@sha256:15952b4306fd990724afaaf7f1c71fcd03546b89fbf6f2d32b0be5f81e3ef431 \
            docker-archive:/work/crowdshield-image.tar \
            -o cyclonedx-json=/work/crowdshield.cdx.json \
            -o spdx-json=/work/crowdshield.spdx.json
          test -s .tmp/crowdshield.cdx.json
          test -s .tmp/crowdshield.spdx.json

      - name: Generate Trivy source and image reports
        run: |
          mkdir -p .tmp/trivy-cache
          TRIVY='docker.io/aquasec/trivy:0.69.3@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c'
          docker run --rm --volume "$PWD:/src:ro" --volume "$PWD/.tmp:/work" "$TRIVY" \
            fs --quiet --cache-dir /work/trivy-cache \
            --scanners vuln,secret,misconfig \
            --skip-dirs /src/.git --skip-dirs /src/.tmp \
            --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL --exit-code 0 \
            --format json --output /work/trivy-source.json /src
          docker run --rm --volume "$PWD/.tmp:/work" "$TRIVY" \
            image --quiet --cache-dir /work/trivy-cache --input /work/crowdshield-image.tar \
            --scanners vuln,secret \
            --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL --exit-code 0 \
            --format json --output /work/trivy-image.json

      - name: Enforce Trivy high and critical gate
        run: |
          TRIVY='docker.io/aquasec/trivy:0.69.3@sha256:bcc376de8d77cfe086a917230e818dc9f8528e3c852f7b1aff648949b6258d1c'
          docker run --rm --volume "$PWD:/src:ro" --volume "$PWD/.tmp:/work" "$TRIVY" \
            fs --quiet --cache-dir /work/trivy-cache \
            --scanners vuln,secret,misconfig \
            --skip-dirs /src/.git --skip-dirs /src/.tmp \
            --severity HIGH,CRITICAL --exit-code 1 \
            --format json --output /work/trivy-source-gate.json /src
          docker run --rm --volume "$PWD/.tmp:/work" "$TRIVY" \
            image --quiet --cache-dir /work/trivy-cache --input /work/crowdshield-image.tar \
            --scanners vuln,secret --severity HIGH,CRITICAL --exit-code 1 \
            --format json --output /work/trivy-image-gate.json

      - name: Upload container reports
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: container-reports-${{ github.run_id }}
          path: |
            .tmp/image-verification.json
            .tmp/image-inspect.json
            .tmp/image-history.txt
            .tmp/image-size.json
            .tmp/crowdshield.cdx.json
            .tmp/crowdshield.spdx.json
            .tmp/trivy-source.json
            .tmp/trivy-source-gate.json
            .tmp/trivy-image.json
            .tmp/trivy-image-gate.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 14
