# Crowdshield's default feed set was deliberately reviewed. Spamhaus use is
# subject to its DROP Terms; FireHOL Level 1 is an aggregate whose metadata
# reports its aggregate license as unknown. See docs/discovery.md.

server:
  listen_address: ":9090"
  read_header_timeout: "5s"
  read_timeout: "10s"
  write_timeout: "30s"
  idle_timeout: "1m"
  shutdown_timeout: "10s"
  lapi_unreachable_grace: "15m"
  readiness_max_sync_age: "12h"

schedule:
  interval: "6h"
  startup_jitter: "10m"
  run_immediately: true
  retry:
    max_attempts: 3
    initial_backoff: "30s"
    max_backoff: "5m"

database:
  path: "/data/crowdshield.db"
  busy_timeout: "5s"
  integrity_check_on_startup: true
  history_retention: "720h"
  max_history_entries: 1000

crowdsec:
  credentials_file: "/run/secrets/crowdshield-lapi-credentials.yaml"
  request_timeout: "15s"
  connect_timeout: "5s"
  max_response_bytes: 8388608
  batch_size: 250
  auth_refresh_before: "5m"

decisions:
  duration: "25h"
  missing_grace_runs: 2
  refresh_before: "12h"

feeds:
  - name: "spamhaus-drop-ipv4"
    enabled: true
    url: "https://www.spamhaus.org/drop/drop_v4.json"
    format: "spamhaus-drop-jsonl"
    family: "ipv4"
    timeout: "30s"
    max_download_bytes: 2097152
    expected_min_entries: 500
    expected_max_entries: 5000
    max_growth_ratio: 1.5
    max_shrink_ratio: 0.5
    attribution: "The Spamhaus Project DROP; https://www.spamhaus.org/blocklists/do-not-route-or-peer/"
    min_update_interval: "24h"
    allow_http: false
    content_types:
      - "text/json"
      - "application/json"
      - "application/x-ndjson"
    require_final_newline: true
    max_malformed_lines: 10
    max_malformed_ratio: 0.01

  - name: "spamhaus-drop-ipv6"
    enabled: true
    url: "https://www.spamhaus.org/drop/drop_v6.json"
    format: "spamhaus-drop-jsonl"
    family: "ipv6"
    timeout: "30s"
    max_download_bytes: 1048576
    expected_min_entries: 20
    expected_max_entries: 1000
    max_growth_ratio: 1.5
    max_shrink_ratio: 0.5
    attribution: "The Spamhaus Project DROP; https://www.spamhaus.org/blocklists/do-not-route-or-peer/"
    min_update_interval: "24h"
    allow_http: false
    content_types:
      - "text/json"
      - "application/json"
      - "application/x-ndjson"
    require_final_newline: true
    max_malformed_lines: 10
    max_malformed_ratio: 0.01

  - name: "firehol-level1"
    enabled: true
    url: "https://iplists.firehol.org/files/firehol_level1.netset"
    format: "firehol-netset"
    family: "ipv4"
    timeout: "30s"
    max_download_bytes: 5242880
    expected_min_entries: 1000
    expected_max_entries: 20000
    max_growth_ratio: 1.5
    max_shrink_ratio: 0.5
    attribution: "FireHOL Level 1 (DShield, Feodo Tracker, Team Cymru FullBogons, Spamhaus DROP); https://iplists.firehol.org/?ipset=firehol_level1"
    min_update_interval: "6h"
    allow_http: false
    content_types:
      - "application/octet-stream"
      - "text/plain"
    require_final_newline: true
    max_malformed_lines: 10
    max_malformed_ratio: 0.01

# Any overlap suppresses the complete imported decision. This prevents a broad
# feed CIDR from blocking an address that the operator explicitly allowlists.
allowlists:
  cidrs: []

validation:
  allow_http: false
  max_redirects: 3
  max_feeds: 32
  max_feed_name_length: 64
  max_malformed_lines: 10
  max_malformed_ratio: 0.01
  max_line_bytes: 65536
  # user_agent is omitted so the binary supplies crowdshield/<build-version>.
  dns_lookup_timeout: "5s"

logging:
  level: "info"
  format: "json"

notifications:
  enabled: false
  server_url: ""
  topic: ""
  allow_http: false
  request_timeout: "10s"
  cooldown: "1h"
  minimum_severity: "warning"
  failure_threshold: 3
  recovery_notifications: true
  suspicious_change_notifications: true
  stale_sync_notifications: true
  stale_sync_after: "12h"
  startup_notification: false
  success_notification: false
  first_success_notification: false
  # Token is intentionally unavailable in YAML. Set it with
  # CROWDSHIELD_NOTIFICATIONS_TOKEN.
